<!DOCTYPE html>
<html>
<head>
  <title>Zapier Webhook Test</title>
  <style>
    body { font-family: Arial; padding: 40px; max-width: 600px; margin: auto; }
    button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #5b9bd5; color: white; border: none; border-radius: 5px; }
    button:hover { background: #4a7aa8; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow: auto; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>

<h1>🧪 Zapier Webhook Test</h1>

<p>This page sends test data directly to your Zapier webhook.</p>

<button onclick="sendTest()">📤 Send Test to Zapier</button>

<div id="output"></div>

<script>
  const WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/22898586/u7q3fby/";
  
  async function sendTest() {
    const output = document.getElementById("output");
    output.innerHTML = "<p>⏳ Sending...</p>";
    
    const testData = {
      name: "Test User " + new Date().getTime(),
      businessName: "Test Flooring Co",
      phone: "(555) 123-4567",
      city: "Test City, TX",
      score: 72,
      timestamp: new Date().toISOString(),
      quizAnswers: { 1: 3, 2: 4, 3: 2, 4: 1, 5: 2, 6: 3, 7: 2 }
    };

    console.log("Sending:", testData);

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(testData),
        mode: "no-cors"
      });

      console.log("Response:", response);
      
      output.innerHTML = `
        <h3 class="success">✅ Webhook Request Sent!</h3>
        <p>Status: ${response.status} (opaque with no-cors)</p>
        <p><strong>Check Zapier dashboard now</strong> - the request should arrive in 1-2 seconds.</p>
        <p>Data sent:</p>
        <pre>${JSON.stringify(testData, null, 2)}</pre>
      `;
    } catch (err) {
      console.error("Error:", err);
      output.innerHTML = `
        <h3 class="error">❌ Error Sending Webhook</h3>
        <p>${err.message}</p>
        <p>Try opening browser console (F12) to see full error.</p>
      `;
    }
  }

  // Auto-check on load
  window.addEventListener("load", () => {
    document.body.innerHTML += `
      <hr>
      <h3>Webhook URL</h3>
      <p>${WEBHOOK_URL}</p>
    `;
  });
</script>

</body>
</html>
