<!DOCTYPE html>
<html>
<head>
  <title>Webhook Integration Test</title>
  <style>
    body { font-family: Arial; padding: 40px; max-width: 600px; margin: auto; }
    .provider-select { margin: 20px 0; }
    .provider-select select { padding: 8px; font-size: 14px; }
    .url-input { margin: 15px 0; }
    .url-input label { display: block; margin-bottom: 5px; font-weight: bold; }
    .url-input input { width: 100%; padding: 10px; box-sizing: border-box; }
    button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #5b9bd5; color: white; border: none; border-radius: 5px; margin: 10px 5px 10px 0; }
    button:hover { background: #4a7aa8; }
    button.secondary { background: #999; }
    button.secondary:hover { background: #777; }
    pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow: auto; max-height: 300px; }
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
    .info { color: #0066cc; font-weight: bold; }
    .warning { color: #ff9900; font-weight: bold; }
  </style>
</head>
<body>

<h1>🧪 Webhook Integration Tester</h1>

<div class="provider-select">
  <label>Select Webhook Provider:</label>
  <select id="provider" onchange="updateProvider()">
    <option value="zapier">Zapier</option>
    <option value="n8n">n8n</option>
  </select>
</div>

<div class="url-input">
  <label>Webhook URL:</label>
  <input type="text" id="webhookUrl" readonly style="background: #f0f0f0;">
</div>

<div class="url-input">
  <label>Custom Webhook URL (for testing):</label>
  <input type="text" id="customUrl" placeholder="Paste alternative webhook URL here">
  <small>Leave blank to use default above</small>
</div>

<button onclick="sendTest()">📤 Send Test Data</button>
<button class="secondary" onclick="copyUrl()">📋 Copy URL</button>
<button class="secondary" onclick="clearOutput()">🗑️ Clear Output</button>

<div id="output" style="margin-top: 20px;"></div>

<script>
  const ZAPIER_URL = "https://hooks.zapier.com/hooks/catch/22898586/u7q3fby/";
  const N8N_URL = "http://localhost:5678/webhook-test/7402bc39-8eef-47af-9a4b-3522fc917d3a";

  function getWebhookUrl() {
    const custom = document.getElementById("customUrl").value.trim();
    if (custom) return custom;

    const provider = document.getElementById("provider").value;
    return provider === "zapier" ? ZAPIER_URL : N8N_URL;
  }

  function updateProvider() {
    document.getElementById("webhookUrl").value = getWebhookUrl();
  }

  function copyUrl() {
    const url = getWebhookUrl();
    navigator.clipboard.writeText(url);
    alert("✅ URL copied to clipboard!");
  }

  function clearOutput() {
    document.getElementById("output").innerHTML = "";
  }

  async function sendTest() {
    const output = document.getElementById("output");
    const webhookUrl = getWebhookUrl();
    
    if (!webhookUrl) {
      output.innerHTML = "<p class='error'>❌ No webhook URL configured</p>";
      return;
    }

    output.innerHTML = "<p class='info'>⏳ Sending test data...</p>";
    
    const testData = {
      firstName: "John",
      lastName: "Test " + new Date().getTime(),
      phone: "(555) 123-4567",
      companyName: "Test Flooring Co",
      city: "Test City, TX",
      quizScore: 72,
      timestamp: new Date().toISOString(),
      quizAnswers: { 1: 3, 2: 4, 3: 2, 4: 1, 5: 2, 6: 3, 7: 2 }
    };

    console.log("Sending to:", webhookUrl);
    console.log("Data:", testData);

    try {
      const response = await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(testData),
        mode: "no-cors",
      });

      console.log("Response:", response);
      
      output.innerHTML = `
        <h3 class="success">✅ Webhook Request Sent!</h3>
        <p><strong>Provider:</strong> ${document.getElementById("provider").value.toUpperCase()}</p>
        <p><strong>Status:</strong> ${response.status} (opaque with no-cors)</p>
        <p class="info">Check your webhook provider's logs/dashboard for the incoming request.</p>
        <p><strong>Data sent:</strong></p>
        <pre>${JSON.stringify(testData, null, 2)}</pre>
      `;
    } catch (err) {
      console.error("Error:", err);
      output.innerHTML = `
        <h3 class="error">❌ Error Sending Webhook</h3>
        <p>${err.message}</p>
        <p>Check browser console (F12) for full error details.</p>
      `;
    }
  }

  // Initialize on load
  window.addEventListener("load", () => {
    updateProvider();
  });
</script>

</body>
</html>
